name = "cf-workers-ai-api"
main = "src/worker.js"
compatibility_date = "2024-01-01"

workers_dev = true

[ai]
binding = "AI"
remote = true

[assets]
directory = "./public"
binding = "ASSETS"
run_worker_first = ["/v1/models", "/v1/chat/completions", "/v1/responses", "/v1/images/generations", "/health"]
